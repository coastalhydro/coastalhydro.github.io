<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>We have moved!</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f7f7f7;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 24px;
    }

    .box {
      max-width: 700px;
      background: white;
      padding: 40px 32px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    h1 {
      margin: 0 0 16px;
      font-size: 2.5rem;
      color: #1f1f1f;
    }

    p {
      margin: 0 0 20px;
      font-size: 1.2rem;
      color: #444;
    }

    a {
      color: #0b57d0;
      font-weight: bold;
      text-decoration: none;
      word-break: break-word;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>We have moved!</h1>
    <p>Please visit our new website:</p>
    <p>
      <a href="https://sites.google.com/ucsc.edu/coastalhydro/" target="_blank">
        https://sites.google.com/ucsc.edu/coastalhydro/
      </a>
    </p>
  </div>
</body>
</html>
